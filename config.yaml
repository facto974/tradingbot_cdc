strategy:
  weights:
    momentum: 0.70
    sentiment: 0.10
    fear_greed: 0.20
  momentum:
    lookback_days: 3
    ema_smooth: 8
    enable_trend_filter: false
    sma_fast: 50
    sma_slow: 200
  thresholds:
    long: 0.05
    short: -0.10
    close_threshold: -0.30
    close_short_threshold: 0.05
  sentiment:
    high_conviction: false
    min_active_sources: 1
    require_aligned: false
    min_momentum_abs: 0.01
    reddit_subs:
      - CryptoCurrency
      - CryptoMarkets
      - altcoin
    reddit_limit: 50
risk:
  allow_short: true
  initial_capital: 100
  max_position_usd: 80
  kelly_fraction: 1.0
  stop_loss_pct: 0.04
  take_profit_pct: 0.06
  short_stop_loss_pct: 0.04
  short_take_profit_pct: 0.06
  max_concurrent_positions: 2
  equity_stop_loss_pct: 0.15
  cooldown_after_sl_min: 15
llm:
  validate_signals: false
  model: deepseek/deepseek-v4-flash
  temperature: 0.2
telegram: {}
metrics:
  enabled: true
  port: 8000