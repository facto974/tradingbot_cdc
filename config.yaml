strategy:
  weights:
    momentum: 0.65       # 0.70 → 0.65 (légère baisse, momentum reste dominant)
    sentiment: 0.20      # 0.10 → 0.20 (Reddit/binance plus utilisés)
    fear_greed: 0.15     # 0.20 → 0.15 ⚡ réduit biais SHORT macro

  momentum:
    lookback_days: 24    # 3 → 24 ⚡ momentum sur 2h (24×5min) au lieu de 15min
    ema_smooth: 12       # 8 → 12 (smoothing sur 1h)
    enable_trend_filter: true   # false → true ⚡ évite shorter en bull et inverse
    sma_fast: 24         # 50 → 24 (2h sur 5min OHLCV)
    sma_slow: 144        # 200 → 144 (12h, cycle journalier complet)

  thresholds:
    long: 0.05           # inchangé (déjà bas)
    short: -0.08         # -0.10 → -0.08 (symétrie LONG/SHORT)
    close_threshold: -0.05         # -0.30 → -0.05 ⚡⚡ FIX BUG #2
    close_short_threshold: -0.03   # 0.05 → -0.03 ⚡⚡ FIX BUG #1

  sentiment:
    high_conviction: false
    min_active_sources: 1
    require_aligned: true        # false → true ⚡ exige momentum+sentiment alignés
    min_momentum_abs: 0.03       # 0.01 → 0.03 (filtre les signaux trop faibles)
    reddit_subs:
      - CryptoCurrency
      - CryptoMarkets
      - altcoin
    reddit_limit: 50

risk:
  allow_short: true
  initial_capital: 100
  max_position_usd: 25            # 80 → 25 ⚡ permet 4 positions simultanées
  kelly_fraction: 0.3             # 1.0 → 0.3 ⚡ quart-Kelly (variance /3)
  stop_loss_pct: 0.025            # 0.04 → 0.025 (SL plus serré)
  take_profit_pct: 0.05           # 0.06 → 0.05 (R:R 1:2)
  short_stop_loss_pct: 0.025
  short_take_profit_pct: 0.05
  max_concurrent_positions: 4     # 2 → 4 ⚡ diversification
  equity_stop_loss_pct: 0.15
  cooldown_after_sl_min: 30       # 15 → 30 (évite revenge trading)

llm:
  validate_signals: false
  model: deepseek/deepseek-v4-flash
  temperature: 0.2

telegram: {}

metrics:
  enabled: true
  port: 8000
